# =============================================================================
# LinkShort — Application Configuration
# =============================================================================
# Default profile uses H2 in-memory DB (no Docker required).
# Switch to 'prod' profile for PostgreSQL + Redis.
# =============================================================================

server:
  port: 8080
  # Limit request body size to prevent DoS via large payloads
  tomcat:
    max-http-form-post-size: 1048576    # 1 MB
    max-swallow-size: 1048576           # 1 MB

spring:
  application:
    name: linkshort

  # Request body size limit (Spring layer)
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

  # --------------------------------------------------------------------------
  # H2 In-Memory Database (Default — Local Development)
  # --------------------------------------------------------------------------
  datasource:
    url: jdbc:h2:mem:linkshort;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Console — DISABLED by default for security (RCE risk).
  # Enable only for local dev: set H2_CONSOLE_ENABLED=true
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console

  # --------------------------------------------------------------------------
  # JPA / Hibernate
  # --------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update          # Auto-create/update schema from entities
    show-sql: false             # Set true for SQL debugging
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # --------------------------------------------------------------------------
  # Redis (disabled by default — works without Docker)
  # --------------------------------------------------------------------------
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

# =============================================================================
# Custom Application Properties
# =============================================================================
app:
  base-url: ${APP_BASE_URL:auto}           # Set APP_BASE_URL env var for production domain
  jwt:
    # SECURITY: Must be set via JWT_SECRET env var. App will fail to start with default.
    secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION}
    expiration-hours: 24
  rate-limit:
    enabled: true
    requests-per-minute: 100
    # Stricter limits for auth endpoints (brute-force protection)
    auth-requests-per-minute: 5
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  cache:
    enabled: false                       # Set true when Redis is available
    ttl-minutes: 60                      # Cache TTL for URL mappings
  default-expiry-days: 365               # Default link expiry (1 year)

# =============================================================================
# Logging
# =============================================================================
logging:
  level:
    root: INFO
    com.linkshort: INFO
    org.springframework.web: INFO
    # Uncomment for debugging:
    # com.linkshort: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
# =============================================================================
# Production Profile (activate with --spring.profiles.active=prod)
# =============================================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/linkshort}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USER:linkshort}
    password: ${DATABASE_PASSWORD:}

  h2:
    console:
      enabled: false

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  cache:
    enabled: true

