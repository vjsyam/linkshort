version: '3.8'

services:
  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: linkshort
      POSTGRES_USER: linkshort
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-linkshort_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkshort"]
      interval: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ---- Spring Boot Backend ----
  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://db:5432/linkshort
      DATABASE_USER: linkshort
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-linkshort_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET env var is required}
    ports:
      - "8080:8080"

  # ---- React Frontend (Nginx) ----
  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
